<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>Favicon options</title>
<style>
  body { background:#0f172a; color:#f8fafc; font-family:system-ui,sans-serif; padding:48px; }
  h1 { font-weight:700; margin-bottom:32px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:32px; }
  .card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:24px; text-align:center; }
  .row { display:flex; align-items:center; justify-content:center; gap:24px; margin-bottom:16px; }
  .swatch { background:#fff; padding:8px; border-radius:8px; }
  .swatch-dark { background:#0f172a; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); }
  img.size-16 { width:16px; height:16px; image-rendering:pixelated; }
  img.size-32 { width:32px; height:32px; image-rendering:pixelated; }
  img.size-64 { width:64px; height:64px; }
  img.size-128 { width:128px; height:128px; }
  h2 { font-size:1rem; margin:0 0 12px; opacity:0.8; }
  code { font-size:0.85rem; opacity:0.6; }
</style>
</head>
<body>
<h1>Favicon options · 选一个</h1>
<div class="grid">

  <div class="card">
    <h2>A · 经典咖波</h2>
    <div class="row">
      <div class="swatch"><img class="size-16" src="option-a-classic-capoo.svg"/></div>
      <div class="swatch"><img class="size-32" src="option-a-classic-capoo.svg"/></div>
      <div class="swatch-dark"><img class="size-32" src="option-a-classic-capoo.svg"/></div>
    </div>
    <img class="size-128" src="option-a-classic-capoo.svg"/>
    <p><code>option-a-classic-capoo.svg</code></p>
  </div>

  <div class="card">
    <h2>B · 字母 C 渐变</h2>
    <div class="row">
      <div class="swatch"><img class="size-16" src="option-b-monogram.svg"/></div>
      <div class="swatch"><img class="size-32" src="option-b-monogram.svg"/></div>
      <div class="swatch-dark"><img class="size-32" src="option-b-monogram.svg"/></div>
    </div>
    <img class="size-128" src="option-b-monogram.svg"/>
    <p><code>option-b-monogram.svg</code></p>
  </div>

  <div class="card">
    <h2>C · 像素咖波</h2>
    <div class="row">
      <div class="swatch"><img class="size-16" src="option-c-pixel.svg"/></div>
      <div class="swatch"><img class="size-32" src="option-c-pixel.svg"/></div>
      <div class="swatch-dark"><img class="size-32" src="option-c-pixel.svg"/></div>
    </div>
    <img class="size-128" src="option-c-pixel.svg"/>
    <p><code>option-c-pixel.svg</code></p>
  </div>

  <div class="card">
    <h2>D · 极简紫剪影</h2>
    <div class="row">
      <div class="swatch"><img class="size-16" src="option-d-minimal.svg"/></div>
      <div class="swatch"><img class="size-32" src="option-d-minimal.svg"/></div>
      <div class="swatch-dark"><img class="size-32" src="option-d-minimal.svg"/></div>
    </div>
    <img class="size-128" src="option-d-minimal.svg"/>
    <p><code>option-d-minimal.svg</code></p>
  </div>

</div>
</body>
</html>
