<!doctype html>
<html lang="zh-CN" data-theme="dark" data-layout="layout-b">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CapooTech</title>
  <meta name="description" content="CapooTech apps: Grain and NeuralNote" />
  <link rel="icon" type="image/svg+xml" href="/favicon-capoo.svg?v=20260208" />
  <link rel="stylesheet" href="/styles.css?v=20260427a" />
  <script src="/lang-toggle.js?v=20260427a" defer></script>
  <script src="/theme-toggle.js?v=20260427a" defer></script>
  <script src="/layout-toggle.js?v=20260427a" defer></script>
  <script src="/gallery-loader.js?v=20260427a" defer></script>
</head>
<body>
  
  <!-- 方案 A：满屏环境漂浮泡泡 (Layout A) -->
  <!-- 内容现由 headless CMS 驱动的 gallery-loader.js 动态生成 -->
  <div class="floating-cats" aria-hidden="true">
  </div>

  <!-- 方案 B：顶部相框/履带 (Layout B) -->
  <!-- 内容现由 headless CMS 驱动的 gallery-loader.js 动态生成 -->
  <div class="edge-cats edge-top" aria-hidden="true">
    <div class="edge-track animate-left">
    </div>
  </div>

  <!-- 方案 B：底部相框/履带 (Layout B) -->
  <!-- 内容现由 headless CMS 驱动的 gallery-loader.js 动态生成 -->
  <div class="edge-cats edge-bottom" aria-hidden="true">
    <div class="edge-track animate-right">
    </div>
  </div>

  <main class="page">
    <header class="topbar">
      <!-- 视角切换 -->
      <button
        id="layout-toggle"
        class="lang-toggle"
        type="button"
        aria-label="切换排版"
        title="切换排版呈现(画框/漂浮泡泡)"
      >
        <span class="lang-icon" aria-hidden="true" id="layout-icon">🫧</span>
      </button>

      <!-- 主题切换 -->
      <button
        id="theme-toggle"
        class="lang-toggle"
        type="button"
        aria-label="切换主题"
        title="切换主题"
      >
        <span class="lang-icon" aria-hidden="true" id="theme-icon">🌙</span>
      </button>

      <!-- 语言切换 -->
      <button
        id="lang-toggle"
        class="lang-toggle"
        type="button"
        aria-label="切换到英文"
        title="切换语言"
      >
        <span class="lang-icon" aria-hidden="true">🌐</span>
        <span id="lang-label" class="lang-label">中</span>
      </button>
    </header>

    <section class="hero">
      <p class="kicker" data-i18n="brand">咖波科技 · CapooTech</p>
      <h1 data-i18n="title">咖波的小宇宙</h1>
      <p class="subtitle" data-i18n="subtitle">咖波科技的所有产品都从这里出发，咖波本喵也住在这儿。</p>
      <div class="cta-grid">
        <a class="card grain" href="https://grain.capootech.com" target="_blank" rel="noopener noreferrer">
          <h2>Grain</h2>
          <p data-i18n="grainDesc">把你的草稿，改成你想说出口的样子。</p>
          <span data-i18n="openGrain">打开 Grain</span>
        </a>
        <a class="card neuralnote" href="https://neuralnote.capootech.com" target="_blank" rel="noopener noreferrer">
          <h2>NeuralNote</h2>
          <p data-i18n="neuralDesc">和你的科研笔记像聊天一样对话。</p>
          <span data-i18n="openNeural">打开 NeuralNote</span>
        </a>
      </div>
    </section>

    <footer class="site-footer" aria-label="Site filings">
      <div class="filings">
        <a
          class="filing-link"
          href="https://beian.miit.gov.cn/#/Integrated/index"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span>鲁ICP备2026008688号-2</span>
        </a>
        <a
          class="filing-link filing-link-police"
          href="https://beian.mps.gov.cn/#/query/webSearch"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            class="filing-badge"
            src="/images/filings/public-security-badge.png"
            alt=""
            aria-hidden="true"
            loading="lazy"
          />
          <span>鲁公网安备37021402007212号</span>
        </a>
      </div>
    </footer>

  </main>
</body>
</html>
