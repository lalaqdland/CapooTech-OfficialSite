backend:
  name: github
  repo: lalaqdland/CapooTech-OfficialSite
  branch: main
  # Sveltia CMS PKCE flow — no Netlify proxy, no client secret needed.
  # The app_id below is the Client ID of a GitHub OAuth App registered at:
  #   GitHub → Settings → Developer settings → OAuth Apps → New OAuth App
  # Authorization callback URL must be: https://capootech.com/admin/
  auth_type: pkce
  app_id: Ov23liSU4DTQ20L38bNv

media_folder: "images/capoo"
public_folder: "/images/capoo"

# 这里定义了我们对 data/photos.json 文件的直接网页版控制权限
collections:
  - name: "site_data"
    label: "Site Content"
    files:
      - file: "data/photos.json"
        label: "Cat Gallery"
        name: "photos"
        fields:
          - name: "gallery"
            label: "🌟 Cat Photos (在这里管理主页的轮播照片)"
            widget: "list"
            fields:
              - {name: "url", label: "Image", widget: "image"}
