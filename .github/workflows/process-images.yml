name: Process and Optimize Images

on:
  push:
    paths:
      - 'images/capoo/**'
      - 'data/photos.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - only show what would be changed'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: image-processing
  cancel-in-progress: false

jobs:
  process-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Install system dependencies (ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Run image processing script
        id: process
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python ops/image-processor/process_images.py

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true' && inputs.dry_run != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          git commit -m "chore(images): auto-process and optimize images

          - Auto-renamed images with timestamp
          - Converted to WebP format
          - Optimized/compressed images
          - Updated photos.json references" || echo "No changes to commit"
          
          git push
